name: Build and Deploy - API Concordia Main

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_and_push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "repo_owner_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_owner_lower }}/api-concordia:${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ steps.vars.outputs.repo_owner_lower }}/api-concordia:latest

  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    needs: build_and_push
    
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
      REPO_OWNER: ${{ github.repository_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          REPO_OWNER_LOWER=$(echo "${{ env.REPO_OWNER }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${REPO_OWNER_LOWER} --password-stdin

      - name: Create .env file for Docker Compose
        run: |
          REPO_OWNER_LOWER=$(echo "${{ env.REPO_OWNER }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO_OWNER_LOWER=${REPO_OWNER_LOWER}" > .env
          echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> .env
          echo "CRYPTO_SECRET='${{ secrets.CRYPTO_SECRET }}'" >> .env
          echo "DB_HOST_MAIN='${{ secrets.DB_HOST_MAIN }}'" >> .env
          echo "DB_PORT_MAIN='${{ secrets.DB_PORT_MAIN }}'" >> .env
          echo "DB_NAME_MAIN='${{ secrets.DB_NAME_MAIN }}'" >> .env
          echo "DB_USER_MAIN='${{ secrets.DB_USER_MAIN }}'" >> .env
          echo "DB_PASS_MAIN='${{ secrets.DB_PASS_MAIN }}'" >> .env
          echo "JWT_SECRET_MAIN='${{ secrets.JWT_SECRET_MAIN }}'" >> .env
          echo "JWT_EXPIRES_IN='${{ secrets.JWT_EXPIRES_IN }}'" >> .env
          echo "VITE_GOOGLE_MAPS_API_KEY='${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}'" >> .env

      - name: Pull and Update Service
        run: |
          docker compose pull api-concordia-main
          docker compose up -d api-concordia-main

      - name: Healthcheck
        run: |
          echo "Aguardando inicialização da API..."
          for i in {1..10}; do
            if curl -s http://localhost:3337/public/health | grep -q "ok"; then
              echo "API saudável!"
              exit 0
            fi
            echo "Tentativa $i falhou. Aguardando 3s..."
            sleep 3
          done
          echo "ERRO: API não respondeu corretamente no tempo esperado."
          exit 1

      - name: Cleanup
        run: |
          docker image prune -f
          rm .env
