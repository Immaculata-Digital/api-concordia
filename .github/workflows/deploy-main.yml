name: Build and Deploy - API Concordia Main

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_and_lint:
    name: Code Quality (Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Run Lint
        run: npm run lint

  build_and_push:
    name: Build & Push Image
    needs: test_and_lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "repo_owner_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_owner_lower }}/api-concordia:${{ steps.vars.outputs.sha_short }}
            ghcr.io/${{ steps.vars.outputs.repo_owner_lower }}/api-concordia:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    needs: build_and_push
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
      REPO_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          REPO_OWNER_LOWER=$(echo "${{ env.REPO_OWNER }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${REPO_OWNER_LOWER} --password-stdin

      - name: Create .env file for Docker Compose
        run: |
          REPO_OWNER_LOWER=$(echo "${{ env.REPO_OWNER }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "REPO_OWNER_LOWER=${REPO_OWNER_LOWER}"
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}"
            echo "CRYPTO_SECRET=${{ secrets.CRYPTO_SECRET }}"
            echo "JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}"
            echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}"
            echo "EVOLUTION_API_URL=${{ secrets.EVOLUTION_API_URL }}"
            echo "EVOLUTION_API_KEY=${{ secrets.EVOLUTION_API_KEY }}"
            echo "EVOLUTION_NOTIFICATIONS_INSTANCE=${{ secrets.EVOLUTION_NOTIFICATIONS_INSTANCE }}"
            echo "DB_HOST_MAIN=${{ secrets.DB_HOST_MAIN }}"
            echo "DB_PORT_MAIN=${{ secrets.DB_PORT_MAIN }}"
            echo "DB_NAME_MAIN=${{ secrets.DB_NAME_MAIN }}"
            echo "DB_USER_MAIN=${{ secrets.DB_USER_MAIN }}"
            echo "DB_PASS_MAIN=${{ secrets.DB_PASS_MAIN }}"
            echo "JWT_SECRET_MAIN=${{ secrets.JWT_SECRET_MAIN }}"
          } > .env

      - name: Fetch Current Running Tag (for rollback)
        id: current_image
        continue-on-error: true
        run: |
          CURRENT=$(docker inspect --format='{{.Config.Image}}' api-concordia-main | awk -F':' '{print $2}' || echo "")
          echo "current_tag=$CURRENT" >> $GITHUB_OUTPUT

      - name: Pull and Update Service
        run: |
          docker compose pull api-concordia-main
          docker rm -f api-concordia-main || true
          docker compose up -d api-concordia-main

      - name: Healthcheck
        id: healthcheck
        run: |
          echo "Aguardando inicialização da API..."
          for i in {1..10}; do
            if curl -s http://localhost:3337/api/public/health | grep -q "ok"; then
              echo "API saudável!"
              exit 0
            fi
            echo "Tentativa $i falhou. Aguardando 3s..."
            sleep 3
          done
          echo "ERRO: API não respondeu corretamente no tempo esperado."
          exit 1

      - name: Rollback on Failure
        if: failure() && steps.current_image.outputs.current_tag != ''
        run: |
          echo "⚠️ Healthcheck falhou. Iniciando Rollback automático para a tag passada: ${{ steps.current_image.outputs.current_tag }}"
          
          # No bash e env loader, reescrever a linha por cima a atualizará ou 
          # a dupla varíavel será sobrescrita pela última lida no .env do compose
          echo "IMAGE_TAG=${{ steps.current_image.outputs.current_tag }}" >> .env
          
          docker rm -f api-concordia-main || true
          docker compose up -d api-concordia-main
          echo "✅ Rollback concluído. A API retornou ao estado anterior."

      - name: Cleanup
        if: always()
        run: |
          docker image prune -f
          rm -f .env
